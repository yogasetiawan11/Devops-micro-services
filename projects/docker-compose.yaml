services:
  postgres:
    image: postgres:15-alpine
    container_name: boutique_db
    environment:
      POSTGRES_DB: boutique_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      # POSTGRES_MULTYBITE: auth_db,products_db,orders_db,users_db
    ports:
      - "5432:5432" 

    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - ./database/init:/docker-entrypoint-initdb.d

    networks:
      - boutique_networks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5 


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - boutique_networks
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dev
    ports:
      - "3007:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin-123
      GF_ALLOW_USER_SIGN_UP: false

    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - boutique_networks
    restart: unless-stopped

  gateway:
    build:
      context: ./boutique-microservices/backend/services/gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "3001:3001"
    environment:
     - NODE_ENV=development
     - PORT=3001
     - AUTH_SERVICE_URL=http://auth:3002
     - PRODUCT_SERVICE_URL=http://product:3003
     - ORDER_SERVICE_URL=http://order-service:3004
     - ORDERS_SERVICE_URL=http://orders:3005
     - USER_SERVICE_URL=http://user:3006
    depends_on:
      postgres:
        condition: service_healthy   
    networks:
      - boutique_networks
    restart: unless-stopped

  auth:
    build: 
      context: ./boutique-microservices/backend/services/auth
      dockerfile: Dockerfile
    container_name: auth
    ports:
      - "3002:3002"
    environment:
     - ENV_NAME=development 
     - PORT=3002
     - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/auth_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique_networks
    restart: unless-stopped

  product:
    build:
      context: ./boutique-microservices/backend/services/product-service
      dockerfile: Dockerfile
    container_name: product
    ports:
      - "3003:3003"
    environment:
      - ENV_NODE=development
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/products_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique_networks
    restart: unless-stopped

  order_service:
    build:
      context: ./boutique-microservices/backend/services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "3004:3004"
    environment:
      - ENV_NODE=development
      - PORT=3004
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/orders_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique_networks
    restart: unless-stopped
    
  orders: 
    build:
      context: ./boutique-microservices/backend/services/orders
      dockerfile: Dockerfile
    container_name: orders
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DATABASE_URL=postgres://postgres:postgres123@postgres:5432/orders_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique_networks
    restart: unless-stopped

  user:
    build:
      context: ./boutique-microservices/backend/services/user-service
      dockerfile: Dockerfile
    container_name: user
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL=postgres://postgres:postgres123@postgres:5432/users_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique_networks
    restart: unless-stopped


  frontend:
    image: nginx:alpine
    container_name: frontend
    volumes:
      - ./boutique-microservices/frontend/build:/usr/share/nginx/html
      - ./boutique-microservices/frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
     - "3000:80"
    environment:
      - REACT_APP_API_URL=http://gateway:3001/api
    depends_on:
      - gateway
    networks:
     - boutique_networks
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  boutique_networks:
    driver: bridge